# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Render Blueprint — One-click Deploy (No Credit Card)
#  
#  Go to https://dashboard.render.com → New → Blueprint
#  Connect your GitHub repo → Render auto-deploys everything.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
services:
  - type: web
    name: tg-instagram-bot
    runtime: node
    buildCommand: |
      npm install
      npx playwright install chromium
      find /opt/render/.cache/ms-playwright -name chrome -type f -path "*/chrome-linux*/chrome" 2>/dev/null | head -1 > .chromium-path
      echo "Chromium binary at: $(cat .chromium-path)"
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: PROXY_PROVIDERS
        sync: false
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
    autoDeploy: true
    healthCheckPath: /health